<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>世界地图可视化 - Ascend</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-dim: #999;
    --accent: #4fc3f7;
    --accent2: #e94560;
    --border: #2a2a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── 工具栏 ── */
  #toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar label { font-size:13px; color:var(--text-dim); }
  #toolbar input[type="number"] {
    width:80px; padding:4px 8px; border:1px solid var(--border);
    border-radius:4px; background:var(--bg); color:var(--text); font-size:13px;
  }
  #toolbar button {
    padding:4px 12px; border:1px solid var(--border); border-radius:4px;
    background:var(--bg); color:var(--text); font-size:13px;
    cursor:pointer; transition:background 0.15s;
  }
  #toolbar button:hover { background:#2a2a4a; }
  #toolbar button.active { background:var(--accent); color:#000; border-color:var(--accent); }
  #toolbar button.terrain-active { background:var(--accent2); color:#fff; border-color:var(--accent2); }
  #toolbar .sep { width:1px; height:20px; background:var(--border); }
  #info {
    margin-left:auto; font-size:12px; color:var(--text-dim); font-family:monospace;
  }

  /* ── 主区域 ── */
  #main { display:flex; flex:1; overflow:hidden; }

  /* ── 图例 ── */
  #legend {
    width:160px; padding:10px; background:var(--surface);
    border-right:1px solid var(--border); overflow-y:auto; flex-shrink:0;
  }
  #legend h3 { font-size:13px; margin-bottom:8px; color:var(--text-dim); }
  .legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:12px; }
  .legend-swatch { width:14px; height:14px; border-radius:2px; flex-shrink:0; }
  #legend-gradient { width:100%; height:16px; border-radius:2px; margin-bottom:4px; }
  #legend-range { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:8px; }

  /* ── 画布容器 ── */
  #canvas-wrap {
    flex:1; overflow:hidden; cursor:grab; position:relative;
    background:#0a0a1a;
  }
  #canvas-wrap:active { cursor:grabbing; }
  #canvas-wrap.panning { cursor:grabbing; }
  canvas { display:block; position:absolute; }

  /* ── 悬浮提示 ── */
  #tooltip {
    position:absolute; pointer-events:none;
    background:rgba(0,0,0,0.85); border:1px solid var(--border);
    border-radius:6px; padding:8px 10px; font-size:12px; line-height:1.5;
    font-family:monospace; display:none; z-index:10; white-space:nowrap;
  }

  /* ── 加载指示器 ── */
  #loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:4px;
    font-size:13px; display:none; z-index:5; pointer-events:none;
  }

  /* ── 底部状态栏 ── */
  #status {
    padding:4px 12px; background:var(--surface); border-top:1px solid var(--border);
    font-size:11px; color:var(--text-dim); flex-shrink:0; display:flex; gap:16px;
  }
</style>
</head>
<body>

<!-- 工具栏 -->
<div id="toolbar">
  <label>Seed</label>
  <input type="number" id="seed-input" value="0">
  <button id="btn-apply">应用</button>

  <span class="sep"></span>

  <button data-mode="altitude">海拔</button>
  <button data-mode="temperature">温度</button>
  <button data-mode="rainfall">降雨</button>
  <button data-mode="climate">气候</button>
  <button data-mode="biome" class="active">群系</button>

  <span class="sep"></span>
  <button data-mode="terrain" id="btn-terrain" title="详细地形（Tile 级别 + Chunk 边界）">🗺️ 地形</button>

  <span id="info">--</span>
</div>

<!-- 主区域 -->
<div id="main">
  <div id="legend"><h3>图例</h3><div id="legend-body"></div></div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
    <div id="loading">加载中...</div>
  </div>
</div>

<!-- 状态栏 -->
<div id="status">
  <span id="status-mode">模式: 群系</span>
  <span id="status-hover">悬停: --</span>
  <span id="status-load">就绪</span>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// 无界地图 — 多瓦片缓存架构
// ══════════════════════════════════════════════════════════════════
//
// 两种视图模式：
//   普通模式：chunk 粒度（biome/climate/altitude/temperature/rainfall）
//     瓦片 = 100×100 chunks，每瓦片 100×100 像素
//   地形模式：tile 粒度（terrain）
//     瓦片 = 1 chunk × 200×200 tiles，每瓦片 200×200 像素
//
// 地形模式下显示 chunk 边界线。

const APP_VERSION = 'v24';

// ── 常量 ──────────────────────────────────────────────────────
const TILE_SIZE = 100;       // 普通模式：每瓦片 100×100 区块
const MAX_TILES = 800;       // 普通模式瓦片上限
const BUFFER_CHUNKS = 30;    // 视口外预加载缓冲（区块数）

const TERRAIN_TILE_SIZE = 200;  // 地形模式：每 chunk 200×200 tiles
const MAX_TERRAIN_TILES = 120;  // 地形模式瓦片上限
const TERRAIN_BUFFER = 1;       // 地形模式预加载缓冲（chunk 数）

// ── 固定值域 ──────────────────────────────────────────────────
const FIXED_RANGES = {
  altitude:    { min: -500, max: 5000 },
  temperature: { min: -30,  max: 50   },
  rainfall:    { min: 0,    max: 5000 },
  sunshine:    { min: 0,    max: 24   },
  humidity:    { min: 0,    max: 100  },
  wind_speed:  { min: 0,    max: 50   },
};

// ── 地形颜色 ──────────────────────────────────────────────────
const TERRAIN_COLORS = {
  0:  { hex: '#7ec850', label: '草地',       rgb: [126,200,80]  },
  1:  { hex: '#e8d5a3', label: '沙地',       rgb: [232,213,163] },
  2:  { hex: '#5c3d2e', label: '沃土',       rgb: [92,61,46]    },
  3:  { hex: '#8b8b8b', label: '岩石地',     rgb: [139,139,139] },
  4:  { hex: '#6b6b6b', label: '陡坡',       rgb: [107,107,107] },
  5:  { hex: '#e0e0e0', label: '山巅',       rgb: [224,224,224] },
  6:  { hex: '#5b9ecf', label: '浅水',       rgb: [91,158,207]  },
  7:  { hex: '#1a3a5c', label: '深水',       rgb: [26,58,92]    },
  8:  { hex: '#4a6b3a', label: '沼泽',       rgb: [74,107,58]   },
};

// ── DOM ────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const tooltip = document.getElementById('tooltip');
const legendBody = document.getElementById('legend-body');
const loadingEl = document.getElementById('loading');

// ── 全局状态 ──────────────────────────────────────────────────
const S = {
  seed: 0,
  mode: 'biome',
  cellSize: 12,
  viewCX: -1050,       // 普通模式：视口左上角 chunk 坐标
  viewCY: -1050,
  legend: null,
  generation: 0,
};

// ── 瓦片缓存（普通模式） ─────────────────────────────────────
const tileCache = new Map();      // Map<"tx,ty", {layers, offscreen, accessTime}>
const pendingTiles = new Set();
let _accessCounter = 0;
let _inFlight = 0;
const MAX_IN_FLIGHT = 4;
let _renderScheduled = false;

// ── 瓦片缓存（地形模式） ─────────────────────────────────────
const terrainCache = new Map();   // Map<"cx,cy", {offscreen, accessTime}>
const pendingTerrain = new Set();
let _terrainAccessCounter = 0;
let _terrainInFlight = 0;
const MAX_TERRAIN_IN_FLIGHT = 6;

function tileKey(cx, cy) {
  const tx = Math.floor(cx / TILE_SIZE);
  const ty = Math.floor(cy / TILE_SIZE);
  return `${tx},${ty}`;
}
function tileOrigin(key) {
  const [tx, ty] = key.split(',').map(Number);
  return { cx: tx * TILE_SIZE, cy: ty * TILE_SIZE };
}

function isTerrainMode() { return S.mode === 'terrain'; }

// ════════════════════════════════════════════════════════════════
// 颜色映射
// ════════════════════════════════════════════════════════════════

const BIOME_CMAP = {
  0: [74,124,63], 1: [196,164,62],
  10: [30,107,138], 11: [46,107,138], 12: [90,138,170],
};
const CLIMATE_CMAP = {0:[231,76,60], 1:[39,174,96], 2:[52,152,219], 3:[243,156,18]};

function colorForValue(v, mode) {
  if (mode === 'biome') return BIOME_CMAP[Math.round(v)] || [34,34,34];
  if (mode === 'climate') return CLIMATE_CMAP[Math.round(v)] || [34,34,34];

  const range = FIXED_RANGES[mode] || {min:-500,max:5000};
  const t = Math.max(0, Math.min(1, (v - range.min) / (range.max - range.min + 0.001)));

  if (mode === 'altitude') {
    // 海拔渐变：海平面(alt=0, t≈0.091)处有明显色断 — 海洋蓝→海岸沙色→陆地绿
    const stops = [
      [0.000,[8,15,65]],     // -500m  深海
      [0.045,[20,60,130]],   // -252m  大洋
      [0.082,[45,110,185]],  // -50m   浅海
      [0.090,[75,150,200]],  // -5m    近岸浅水
      [0.092,[185,200,115]], // +10m   海岸沙地  ← 海平面色断
      [0.100,[155,185,90]],  // +50m   沿海草地
      [0.150,[110,160,60]],  // +325m  低地绿
      [0.300,[65,125,40]],   // +1150m 森林绿
      [0.500,[90,105,50]],   // +2250m 高地橄榄
      [0.650,[135,118,72]],  // +3075m 山腰棕
      [0.800,[172,162,147]], // +3900m 岩石灰
      [0.920,[212,207,202]], // +4560m 高山
      [1.000,[252,250,248]], // +5000m 雪峰白
    ];
    let lo=stops[0], hi=stops[stops.length-1];
    for (let i=1;i<stops.length;i++){if(t<=stops[i][0]){lo=stops[i-1];hi=stops[i];break;}}
    const dt=(t-lo[0])/(hi[0]-lo[0]+0.0001);
    return [lo[1][0]+(hi[1][0]-lo[1][0])*dt, lo[1][1]+(hi[1][1]-lo[1][1])*dt, lo[1][2]+(hi[1][2]-lo[1][2])*dt].map(Math.round);
  }
  if (t < 0.25) { const s=t/0.25; return [Math.round(30+s*30), Math.round(60+s*140), Math.round(180)]; }
  if (t < 0.5)  { const s=(t-0.25)/0.25; return [Math.round(60-s*20), Math.round(200-s*40), Math.round(180-s*120)]; }
  if (t < 0.75) { const s=(t-0.5)/0.25; return [Math.round(40+s*160), Math.round(160+s*60), Math.round(60-s*30)]; }
  { const s=(t-0.75)/0.25; return [Math.round(200+s*55), Math.round(220-s*180), Math.round(30)]; }
}

// ════════════════════════════════════════════════════════════════
// 渲染调度
// ════════════════════════════════════════════════════════════════

function scheduleRender() {
  if (_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(() => {
    _renderScheduled = false;
    _renderImpl();
  });
}
function render() { scheduleRender(); }

// ════════════════════════════════════════════════════════════════
// 普通模式渲染
// ════════════════════════════════════════════════════════════════

function _renderNormal() {
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const { cellSize, viewCX, viewCY } = S;
  const ts = TILE_SIZE * cellSize;
  ctx.imageSmoothingEnabled = false;
  let drewAny = false;

  for (const [key, tile] of tileCache) {
    if (!tile.offscreen) continue;
    const { cx: tc, cy: tr } = tileOrigin(key);
    const sx = (tc - viewCX) * cellSize;
    const sy = (tr - viewCY) * cellSize;
    if (sx + ts < 0 || sy + ts < 0 || sx > W || sy > H) continue;
    ctx.drawImage(tile.offscreen, sx, sy, ts, ts);
    drewAny = true;
  }

  // chunk 网格线
  if (cellSize >= 16 && drewAny) {
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 0.5;
    const c0 = Math.floor(viewCX), r0 = Math.floor(viewCY);
    const c1 = Math.ceil(viewCX + W / cellSize), r1 = Math.ceil(viewCY + H / cellSize);
    for (let r = r0; r <= r1; r++) {
      const y = (r - viewCY) * cellSize;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let c = c0; c <= c1; c++) {
      const x = (c - viewCX) * cellSize;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
  }

  // 坐标标记
  if (cellSize >= 8 && drewAny) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `${Math.max(9, cellSize*0.7)}px monospace`;
    ctx.textAlign = 'center';
    const step = Math.max(1, Math.ceil(50 / cellSize)) * 100;
    const sc0 = Math.floor(viewCX / step) * step;
    const sr0 = Math.floor(viewCY / step) * step;
    for (let wx = sc0; wx <= viewCX + W/cellSize; wx += step) {
      const sx = (wx - viewCX) * cellSize;
      if (sx > 20 && sx < W - 20) {
        for (let wy = sr0; wy <= viewCY + H/cellSize; wy += step) {
          const sy = (wy - viewCY) * cellSize;
          if (sy > 15 && sy < H - 5) ctx.fillText(`(${wx},${wy})`, sx, sy);
        }
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
// 地形模式渲染（tile 级别 + chunk 边界）
// ════════════════════════════════════════════════════════════════

function _renderTerrain() {
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const { cellSize, viewCX, viewCY } = S;
  // 地形模式: viewCX/Y = 全局 tile 坐标
  const T = TERRAIN_TILE_SIZE; // 200

  ctx.imageSmoothingEnabled = cellSize < 4;

  // 计算可见的 chunk 范围
  const visibleTileW = Math.ceil(W / cellSize);
  const visibleTileH = Math.ceil(H / cellSize);
  const ccx0 = Math.floor(viewCX / T);
  const ccy0 = Math.floor(viewCY / T);
  const ccx1 = Math.floor((viewCX + visibleTileW - 1) / T);
  const ccy1 = Math.floor((viewCY + visibleTileH - 1) / T);

  for (let ccy = ccy0; ccy <= ccy1; ccy++) {
    for (let ccx = ccx0; ccx <= ccx1; ccx++) {
      const key = `${ccx},${ccy}`;
      const tile = terrainCache.get(key);
      if (!tile || !tile.offscreen) continue;

      // chunk 在屏幕上的位置
      const sx = (ccx * T - viewCX) * cellSize;
      const sy = (ccy * T - viewCY) * cellSize;
      const chunkScreenSize = T * cellSize;

      ctx.drawImage(tile.offscreen, sx, sy, chunkScreenSize, chunkScreenSize);
    }
  }

  // ── Chunk 边界线 ──
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  // 线宽随缩放调整：放大时更粗
  ctx.lineWidth = Math.max(1.5, cellSize * 0.06);

  for (let ccy = ccy0; ccy <= ccy1 + 1; ccy++) {
    const y = (ccy * T - viewCY) * cellSize;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let ccx = ccx0; ccx <= ccx1 + 1; ccx++) {
    const x = (ccx * T - viewCX) * cellSize;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // ── Chunk 坐标标签 ──
  if (cellSize >= 0.5) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    const fontSize = Math.max(10, Math.min(24, cellSize * 0.18));
    ctx.font = `bold ${fontSize}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (let ccy = ccy0; ccy <= ccy1; ccy++) {
      for (let ccx = ccx0; ccx <= ccx1; ccx++) {
        const cx = (ccx * T + T/2 - viewCX) * cellSize;
        const cy = (ccy * T + T/2 - viewCY) * cellSize;
        if (cx > -T*cellSize && cx < W + T*cellSize && cy > -T*cellSize && cy < H + T*cellSize) {
          // 半透明背景
          const labelW = ctx.measureText(`(${ccx},${ccy})`).width;
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.fillRect(cx - labelW/2 - 6, cy - fontSize/2 - 4, labelW + 12, fontSize + 8);
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fillText(`(${ccx},${ccy})`, cx, cy);
          ctx.fillStyle = 'rgba(255,255,255,0.55)'; // reset for next bg
        }
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
// 统一渲染入口
// ════════════════════════════════════════════════════════════════

function _renderImpl() {
  if (isTerrainMode()) _renderTerrain();
  else _renderNormal();
  updateStatusBar();
}

// ════════════════════════════════════════════════════════════════
// 普通模式瓦片加载
// ════════════════════════════════════════════════════════════════

function neededTileKeys() {
  const { viewCX, viewCY, cellSize } = S;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const vw = Math.ceil(W / cellSize), vh = Math.ceil(H / cellSize);
  const areaCX = Math.floor(viewCX) - BUFFER_CHUNKS;
  const areaCY = Math.floor(viewCY) - BUFFER_CHUNKS;
  const areaW = vw + BUFFER_CHUNKS * 2, areaH = vh + BUFFER_CHUNKS * 2;
  const tx0 = Math.floor(areaCX / TILE_SIZE), ty0 = Math.floor(areaCY / TILE_SIZE);
  const tx1 = Math.floor((areaCX + areaW - 1) / TILE_SIZE);
  const ty1 = Math.floor((areaCY + areaH - 1) / TILE_SIZE);
  const keys = new Set();
  for (let ty = ty0; ty <= ty1; ty++)
    for (let tx = tx0; tx <= tx1; tx++)
      keys.add(`${tx},${ty}`);
  return keys;
}

async function fetchTile(key) {
  if (pendingTiles.has(key)) return null;
  pendingTiles.add(key);
  _inFlight++;
  const { cx, cy } = tileOrigin(key);
  const { seed, generation } = S;
  try {
    const url = `/api/tile?seed=${seed}&cx=${cx}&cy=${cy}&w=${TILE_SIZE}&h=${TILE_SIZE}&mode=${S.mode}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    if (generation !== S.generation) return null;
    const buf = await resp.arrayBuffer();
    const all = new Float32Array(buf);
    const layerN = TILE_SIZE * TILE_SIZE;
    const layers = {
      altitude:    all.subarray(0, layerN),
      temperature: all.subarray(layerN, layerN * 2),
      rainfall:    all.subarray(layerN * 2, layerN * 3),
      climate:     all.subarray(layerN * 3, layerN * 4),
      biome:       all.subarray(layerN * 4, layerN * 5),
    };
    const grid = layers[S.mode];
    const imgData = new ImageData(TILE_SIZE, TILE_SIZE);
    for (let i = 0; i < layerN; i++) {
      const rgba = colorForValue(grid[i], S.mode);
      const p = i * 4;
      imgData.data[p]=rgba[0]; imgData.data[p+1]=rgba[1];
      imgData.data[p+2]=rgba[2]; imgData.data[p+3]=255;
    }
    const off = document.createElement('canvas');
    off.width = TILE_SIZE; off.height = TILE_SIZE;
    off.getContext('2d').putImageData(imgData, 0, 0);
    tileCache.set(key, { layers, offscreen: off, accessTime: ++_accessCounter });
    if (!S.legend) fetchLegend();
    return { key };
  } catch (e) {
    console.error(`瓦片 ${key} 加载失败:`, e);
    return null;
  } finally {
    pendingTiles.delete(key);
    _inFlight--;
  }
}

function evictLRU() {
  if (tileCache.size <= MAX_TILES) return;
  const needed = neededTileKeys();
  const entries = [...tileCache.entries()]
    .filter(([k]) => !needed.has(k))
    .sort((a, b) => a[1].accessTime - b[1].accessTime);
  for (const [key] of entries) {
    if (tileCache.size <= MAX_TILES) break;
    tileCache.delete(key);
  }
}

function fetchMissingTiles() {
  render();
  fillSlots();
}

function fillSlots() {
  const needed = neededTileKeys();
  const missing = [...needed].filter(k => !tileCache.has(k) && !pendingTiles.has(k));
  if (missing.length === 0 && _inFlight === 0) {
    evictLRU();
    render();
    loadingEl.style.display = 'none';
    document.getElementById('status-load').textContent =
      `就绪 — ${tileCache.size} 瓦片`;
    return;
  }
  const slots = MAX_IN_FLIGHT - _inFlight;
  if (slots <= 0) return;
  const batch = missing.slice(0, slots);
  if (batch.length === 0) return;
  loadingEl.style.display = 'block';
  document.getElementById('status-load').textContent =
    `加载中... 已缓存${tileCache.size}  缺${missing.length}  并发${_inFlight}+${batch.length}`;
  batch.forEach(k => {
    fetchTile(k).then(result => {
      if (result) { render(); evictLRU(); }
      fillSlots();
    });
  });
}

// ════════════════════════════════════════════════════════════════
// 地形模式瓦片加载
// ════════════════════════════════════════════════════════════════

function neededTerrainKeys() {
  const { viewCX, viewCY, cellSize } = S;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const vw = Math.ceil(W / cellSize), vh = Math.ceil(H / cellSize);
  const T = TERRAIN_TILE_SIZE;
  const buf = TERRAIN_BUFFER;
  const ccx0 = Math.floor(viewCX / T) - buf;
  const ccy0 = Math.floor(viewCY / T) - buf;
  const ccx1 = Math.floor((viewCX + vw - 1) / T) + buf;
  const ccy1 = Math.floor((viewCY + vh - 1) / T) + buf;
  const keys = new Set();
  for (let cy = ccy0; cy <= ccy1; cy++)
    for (let cx = ccx0; cx <= ccx1; cx++)
      keys.add(`${cx},${cy}`);
  return keys;
}

async function fetchTerrainTile(key) {
  if (pendingTerrain.has(key)) return null;
  pendingTerrain.add(key);
  _terrainInFlight++;
  const [cx, cy] = key.split(',').map(Number);
  const { seed, generation } = S;
  try {
    const url = `/api/terrain-tile?seed=${seed}&cx=${cx}&cy=${cy}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    if (generation !== S.generation) return null;
    const buf = await resp.arrayBuffer();
    const imgData = new ImageData(TERRAIN_TILE_SIZE, TERRAIN_TILE_SIZE);
    const src = new Uint8ClampedArray(buf);
    imgData.data.set(src);
    const off = document.createElement('canvas');
    off.width = TERRAIN_TILE_SIZE; off.height = TERRAIN_TILE_SIZE;
    off.getContext('2d').putImageData(imgData, 0, 0);
    terrainCache.set(key, { offscreen: off, accessTime: ++_terrainAccessCounter });
    return { key };
  } catch (e) {
    console.error(`地形瓦片 ${key} 加载失败:`, e);
    return null;
  } finally {
    pendingTerrain.delete(key);
    _terrainInFlight--;
  }
}

function evictTerrainLRU() {
  if (terrainCache.size <= MAX_TERRAIN_TILES) return;
  const needed = neededTerrainKeys();
  const entries = [...terrainCache.entries()]
    .filter(([k]) => !needed.has(k))
    .sort((a, b) => a[1].accessTime - b[1].accessTime);
  for (const [key] of entries) {
    if (terrainCache.size <= MAX_TERRAIN_TILES) break;
    terrainCache.delete(key);
  }
}

function fetchMissingTerrainTiles() {
  render();
  fillTerrainSlots();
}

function fillTerrainSlots() {
  const needed = neededTerrainKeys();
  const missing = [...needed].filter(k => !terrainCache.has(k) && !pendingTerrain.has(k));
  if (missing.length === 0 && _terrainInFlight === 0) {
    evictTerrainLRU();
    render();
    loadingEl.style.display = 'none';
    document.getElementById('status-load').textContent =
      `就绪 — ${terrainCache.size} 地形瓦片`;
    return;
  }
  const slots = MAX_TERRAIN_IN_FLIGHT - _terrainInFlight;
  if (slots <= 0) return;
  const batch = missing.slice(0, slots);
  if (batch.length === 0) return;
  loadingEl.style.display = 'block';
  document.getElementById('status-load').textContent =
    `加载地形... 已缓存${terrainCache.size}  缺${missing.length}  并发${_terrainInFlight}+${batch.length}`;
  batch.forEach(k => {
    fetchTerrainTile(k).then(result => {
      if (result) { render(); evictTerrainLRU(); }
      fillTerrainSlots();
    });
  });
}

// ════════════════════════════════════════════════════════════════
// 缓存清理 & 模式切换
// ════════════════════════════════════════════════════════════════

function clearCache() {
  tileCache.clear();
  pendingTiles.clear();
  terrainCache.clear();
  pendingTerrain.clear();
  S.legend = null;
  S.generation++;
  updateLegend();
}

/** 模式切换：普通模式从缓存重涂色；地形模式清缓存切换视图 */
function switchMode(newMode) {
  const wasTerrain = isTerrainMode();
  S.mode = newMode;
  const isTerrain = isTerrainMode();

  // 更新按钮样式
  document.querySelectorAll('#toolbar button[data-mode]').forEach(b => {
    b.classList.remove('active', 'terrain-active');
    if (b.dataset.mode === newMode) {
      b.classList.add(isTerrain ? 'terrain-active' : 'active');
    }
  });

  if (wasTerrain && !isTerrain) {
    // 地形 → 普通：作废旧的 terrain 请求，恢复普通视图
    S.generation++;
    pendingTiles.clear();
    terrainCache.clear();
    pendingTerrain.clear();
    updateLegend();
    fetchMissingTiles();
  } else if (!wasTerrain && isTerrain) {
    // 普通 → 地形：作废旧的普通 tile 请求，切换到 tile 级视图
    S.generation++;
    pendingTerrain.clear();
    tileCache.clear();
    pendingTiles.clear();
    // 把当前视口中心从 chunk 坐标转为 tile 坐标
    const W = wrap.clientWidth, H = wrap.clientHeight;
    const centerCX = S.viewCX + (W / S.cellSize) / 2;
    const centerCY = S.viewCY + (H / S.cellSize) / 2;
    S.viewCX = centerCX * TERRAIN_TILE_SIZE - (W / 2) / 1.0;  // 默认 1px/tile
    S.viewCY = centerCY * TERRAIN_TILE_SIZE - (H / 2) / 1.0;
    S.cellSize = 1.0;  // 1 screen px = 1 tile
    updateLegend();
    fetchMissingTerrainTiles();
  } else if (!isTerrain) {
    // 普通模式之间切换：重涂色
    repaintAllTiles();
  }
}

function repaintAllTiles() {
  const n = TILE_SIZE * TILE_SIZE;
  for (const [, tile] of tileCache) {
    if (!tile.layers) continue;
    const grid = tile.layers[S.mode];
    if (!grid) continue;
    const imgData = new ImageData(TILE_SIZE, TILE_SIZE);
    for (let i = 0; i < n; i++) {
      const rgba = colorForValue(grid[i], S.mode);
      const p = i * 4;
      imgData.data[p]=rgba[0]; imgData.data[p+1]=rgba[1];
      imgData.data[p+2]=rgba[2]; imgData.data[p+3]=255;
    }
    const off = document.createElement('canvas');
    off.width = TILE_SIZE; off.height = TILE_SIZE;
    off.getContext('2d').putImageData(imgData, 0, 0);
    tile.offscreen = off;
  }
  updateLegend();
  render();
}

// ════════════════════════════════════════════════════════════════
// 查询
// ════════════════════════════════════════════════════════════════

function lookupChunk(wcx, wcy) {
  const key = tileKey(wcx, wcy);
  const tile = tileCache.get(key);
  if (!tile || !tile.layers) return null;
  const { cx, cy } = tileOrigin(key);
  const col = wcx - cx, row = wcy - cy;
  if (row<0||row>=TILE_SIZE||col<0||col>=TILE_SIZE) return null;
  const i = row * TILE_SIZE + col;
  return {
    altitude: tile.layers.altitude[i],
    temperature: tile.layers.temperature[i],
    rainfall: tile.layers.rainfall[i],
    climate: Math.round(tile.layers.climate[i]),
    biome: Math.round(tile.layers.biome[i]),
  };
}

// ════════════════════════════════════════════════════════════════
// 图例
// ════════════════════════════════════════════════════════════════

function updateLegend() {
  legendBody.innerHTML = '';
  const { mode } = S;

  if (mode === 'terrain') {
    // 地形图例 — 9 种颜色
    for (const [id, c] of Object.entries(TERRAIN_COLORS)) {
      const div = document.createElement('div');
      div.className = 'legend-item';
      div.innerHTML = `<span class="legend-swatch" style="background:${c.hex}"></span> ${c.label}`;
      legendBody.appendChild(div);
    }
    return;
  }

  if (mode === 'biome' || mode === 'climate') {
    if (S.legend) {
      for (const [id, entry] of Object.entries(S.legend)) {
        const div = document.createElement('div');
        div.className = 'legend-item';
        div.innerHTML = `<span class="legend-swatch" style="background:${entry.color}"></span> ${entry.label}`;
        legendBody.appendChild(div);
      }
    }
  } else {
    const grad = document.createElement('div');
    grad.id = 'legend-gradient';
    grad.style.background = mode === 'altitude'
      ? 'linear-gradient(to bottom, #fcfaf8,#aca293,#6ea03c,#b9c873,#4b96c8,#143c82,#080f41)'
      : 'linear-gradient(to bottom, #1e50a0,#3c8cc8,#64a03c,#c8b432,#c8401e)';
    legendBody.appendChild(grad);

    const rng = document.createElement('div');
    rng.id = 'legend-range';
    const range = FIXED_RANGES[mode] || { min: 0, max: 1 };
    const u = mode==='altitude'?'m' : mode==='temperature'?'°C' : mode==='rainfall'?'mm' : '';
    rng.innerHTML = `<span>${range.max}${u}</span><span>${range.min}${u}</span>`;
    legendBody.appendChild(rng);

    const note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:var(--text-dim);margin-top:4px';
    note.textContent = mode==='altitude' ? '深海→洋底→浅海→近岸→陆地→高地→高山' :
      mode==='temperature' ? '热→冷' : '湿→干';
    legendBody.appendChild(note);
  }
}

// ════════════════════════════════════════════════════════════════
// 状态栏
// ════════════════════════════════════════════════════════════════

function updateStatusBar() {
  const modeNames = {biome:'群系',climate:'气候',altitude:'海拔',temperature:'温度',rainfall:'降雨',terrain:'地形'};
  document.getElementById('status-mode').textContent = `模式: ${modeNames[S.mode]}`;
  if (isTerrainMode()) {
    const T = TERRAIN_TILE_SIZE;
    document.getElementById('info').textContent =
      `tile视口 (${S.viewCX.toFixed(1)}, ${S.viewCY.toFixed(1)})  ` +
      `块:${S.cellSize.toFixed(1)}px/tile  地形瓦片:${terrainCache.size}  ${APP_VERSION}`;
  } else {
    document.getElementById('info').textContent =
      `视口 (${S.viewCX.toFixed(1)}, ${S.viewCY.toFixed(1)})  块:${S.cellSize}px  瓦片:${tileCache.size}  ${APP_VERSION}`;
  }
}

async function fetchLegend() {
  try {
    const resp = await fetch(`/api/map?seed=${S.seed}&cx=0&cy=0&w=1&h=1&mode=${S.mode}`);
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.legend) { S.legend = data.legend; updateLegend(); }
  } catch (_) {}
}

// ════════════════════════════════════════════════════════════════
// 交互（统一处理普通/地形模式）
// ════════════════════════════════════════════════════════════════

let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartVX = 0, dragStartVY = 0;

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartVX = S.viewCX;
  dragStartVY = S.viewCY;
  wrap.classList.add('panning');
});

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  wrap.classList.remove('panning');
  if (isTerrainMode()) fetchMissingTerrainTiles();
  else fetchMissingTiles();
});

window.addEventListener('mousemove', e => {
  if (dragging) {
    const dx = (e.clientX - dragStartX) / S.cellSize;
    const dy = (e.clientY - dragStartY) / S.cellSize;
    S.viewCX = dragStartVX - dx;
    S.viewCY = dragStartVY - dy;
    updateStatusBar();
    render();
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (isTerrainMode()) {
    // 地形模式悬停
    const T = TERRAIN_TILE_SIZE;
    const gtx = Math.floor(S.viewCX + mx / S.cellSize);
    const gty = Math.floor(S.viewCY + my / S.cellSize);
    const ccx = Math.floor(gtx / T);
    const ccy = Math.floor(gty / T);
    const ltx = ((gtx % T) + T) % T;
    const lty = ((gty % T) + T) % T;
    const key = `${ccx},${ccy}`;
    const tile = terrainCache.get(key);
    if (tile && tile.offscreen) {
      const sx = (ccx * T - S.viewCX) * S.cellSize;
      const sy = (ccy * T - S.viewCY) * S.cellSize;
      tooltip.style.display = 'block';
      tooltip.style.left = (sx + (ltx + 1) * S.cellSize + 8) + 'px';
      tooltip.style.top = (sy + lty * S.cellSize - 5) + 'px';
      // 从 offscreen canvas 读颜色反查地形
      const pxData = tile.offscreen.getContext('2d').getImageData(ltx, lty, 1, 1).data;
      const tileId = Object.entries(TERRAIN_COLORS).find(([,c]) =>
        c.rgb[0]===pxData[0] && c.rgb[1]===pxData[1] && c.rgb[2]===pxData[2]
      );
      const terrainName = tileId ? TERRAIN_COLORS[tileId[0]].label : '?';
      tooltip.innerHTML =
        `<b>${terrainName}</b><br>` +
        `全局 tile (${gtx}, ${gty})<br>` +
        `Chunk (${ccx}, ${ccy}) · 局部 (${ltx}, ${lty})`;
      document.getElementById('status-hover').textContent =
        `tile(${gtx},${gty}) chunk(${ccx},${ccy}) local(${ltx},${lty}) ${terrainName}`;
    } else {
      tooltip.style.display = 'none';
      document.getElementById('status-hover').textContent = '悬停: --';
    }
  } else {
    // 普通模式悬停
    const wcx = Math.floor(S.viewCX + mx / S.cellSize);
    const wcy = Math.floor(S.viewCY + my / S.cellSize);
    const d = lookupChunk(wcx, wcy);
    if (d) {
      const clName = (S.legend && S.legend[d.climate]) ? S.legend[d.climate].label : d.climate;
      const bioName = (S.legend && S.legend[d.biome]) ? S.legend[d.biome].label : d.biome;
      const sx = (wcx - S.viewCX) * S.cellSize;
      const sy = (wcy - S.viewCY) * S.cellSize;
      tooltip.style.display = 'block';
      tooltip.style.left = (sx + S.cellSize + 8) + 'px';
      tooltip.style.top = (sy - 5) + 'px';
      tooltip.innerHTML =
        `<b>区块 (${wcx}, ${wcy})</b><br>` +
        `海拔: ${d.altitude.toFixed(0)}m &emsp; 温度: ${d.temperature.toFixed(1)}°C<br>` +
        `降雨: ${d.rainfall.toFixed(0)}mm &emsp; 气候: ${clName}<br>` +
        `群系: ${bioName}`;
      document.getElementById('status-hover').textContent =
        `(${wcx},${wcy}) A${d.altitude.toFixed(0)}m T${d.temperature.toFixed(1)}°C R${d.rainfall.toFixed(0)}mm`;
    } else {
      tooltip.style.display = 'none';
      document.getElementById('status-hover').textContent = '悬停: --';
    }
  }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (isTerrainMode()) {
    // 地形模式缩放 — 更精细的步长
    const oldSize = S.cellSize;
    const step = oldSize >= 8 ? 2 : oldSize >= 3 ? 1 : oldSize >= 1 ? 0.5 : 0.25;
    const newSize = Math.max(0.1, Math.min(30, oldSize + (e.deltaY > 0 ? -step : step)));
    if (newSize === oldSize) return;
    const rect = canvas.getBoundingClientRect();
    const mxTile = S.viewCX + (e.clientX - rect.left) / oldSize;
    const myTile = S.viewCY + (e.clientY - rect.top) / oldSize;
    S.cellSize = newSize;
    S.viewCX = mxTile - (e.clientX - rect.left) / newSize;
    S.viewCY = myTile - (e.clientY - rect.top) / newSize;
    render();
    fetchMissingTerrainTiles();
  } else {
    const oldSize = S.cellSize;
    const step = oldSize >= 16 ? 4 : oldSize >= 6 ? 2 : oldSize >= 2 ? 1 : 0.5;
    const newSize = Math.max(0.5, Math.min(60, oldSize + (e.deltaY > 0 ? -step : step)));
    if (newSize === oldSize) return;
    const rect = canvas.getBoundingClientRect();
    const mxChunk = S.viewCX + (e.clientX - rect.left) / oldSize;
    const myChunk = S.viewCY + (e.clientY - rect.top) / oldSize;
    S.cellSize = newSize;
    S.viewCX = mxChunk - (e.clientX - rect.left) / newSize;
    S.viewCY = myChunk - (e.clientY - rect.top) / newSize;
    render();
    fetchMissingTiles();
  }
});

// 点击区块查看详情
canvas.addEventListener('click', async e => {
  if (dragging) return;
  if (isTerrainMode()) return; // 地形模式不请求 chunk 详情
  const rect = canvas.getBoundingClientRect();
  const wcx = Math.floor(S.viewCX + (e.clientX - rect.left) / S.cellSize);
  const wcy = Math.floor(S.viewCY + (e.clientY - rect.top) / S.cellSize);
  try {
    const resp = await fetch(`/api/chunk?seed=${S.seed}&cx=${wcx}&cy=${wcy}`);
    if (!resp.ok) return;
    const d = await resp.json();
    document.getElementById('status-hover').textContent =
      `区块 (${d.cx},${d.cy}): ${d.biome.label} | ${d.climate_zone.label} | ` +
      `${d.weather.temperature}°C | ${d.weather.altitude}m | ${d.weather.rainfall}mm`;
  } catch (_) {}
});

// 触摸支持
let touches0 = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touches0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, vx: S.viewCX, vy: S.viewCY };
  }
});
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touches0) {
    S.viewCX = touches0.vx - (e.touches[0].clientX - touches0.x) / S.cellSize;
    S.viewCY = touches0.vy - (e.touches[0].clientY - touches0.y) / S.cellSize;
    render();
    updateStatusBar();
  }
});
wrap.addEventListener('touchend', () => {
  touches0 = null;
  if (isTerrainMode()) fetchMissingTerrainTiles();
  else fetchMissingTiles();
});

// ════════════════════════════════════════════════════════════════
// 工具栏事件
// ════════════════════════════════════════════════════════════════

document.getElementById('btn-apply').addEventListener('click', () => {
  S.seed = parseInt(document.getElementById('seed-input').value) || 0;
  clearCache();
  if (isTerrainMode()) fetchMissingTerrainTiles();
  else fetchMissingTiles();
});

document.getElementById('seed-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    S.seed = parseInt(e.target.value) || 0;
    clearCache();
    if (isTerrainMode()) fetchMissingTerrainTiles();
    else fetchMissingTiles();
  }
});

document.querySelectorAll('#toolbar button[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    switchMode(btn.dataset.mode);
  });
});

// ════════════════════════════════════════════════════════════════
// 窗口调整 & 键盘
// ════════════════════════════════════════════════════════════════

window.addEventListener('resize', () => {
  render();
  clearTimeout(S._resizeTimer);
  S._resizeTimer = setTimeout(() => {
    if (isTerrainMode()) fetchMissingTerrainTiles();
    else fetchMissingTiles();
  }, 300);
});

window.addEventListener('keydown', e => {
  if (isTerrainMode()) {
    const step = Math.max(10, 200 / S.cellSize);
    switch (e.key) {
      case 'ArrowLeft':  S.viewCX -= step; break;
      case 'ArrowRight': S.viewCX += step; break;
      case 'ArrowUp':    S.viewCY -= step; break;
      case 'ArrowDown':  S.viewCY += step; break;
      case '+': case '=': S.cellSize = Math.min(30, S.cellSize + (S.cellSize>=8?2:S.cellSize>=3?1:0.5)); break;
      case '-': S.cellSize = Math.max(0.1, S.cellSize - (S.cellSize>=8?2:S.cellSize>=3?1:0.5)); break;
      default: return;
    }
    render();
    fetchMissingTerrainTiles();
  } else {
    const step = Math.max(1, 5 * 12 / S.cellSize);
    switch (e.key) {
      case 'ArrowLeft':  S.viewCX -= step; break;
      case 'ArrowRight': S.viewCX += step; break;
      case 'ArrowUp':    S.viewCY -= step; break;
      case 'ArrowDown':  S.viewCY += step; break;
      case '+': case '=': {
        const s = S.cellSize >= 16 ? 4 : S.cellSize >= 6 ? 2 : S.cellSize >= 2 ? 1 : 0.5;
        S.cellSize = Math.min(60, S.cellSize + s);
        break;
      }
      case '-': {
        const s = S.cellSize >= 16 ? 4 : S.cellSize >= 6 ? 2 : S.cellSize >= 2 ? 1 : 0.5;
        S.cellSize = Math.max(0.5, S.cellSize - s);
        break;
      }
      default: return;
    }
    render();
    fetchMissingTiles();
  }
});

// ════════════════════════════════════════════════════════════════
// 启动
// ════════════════════════════════════════════════════════════════

fetchMissingTiles();
</script>
